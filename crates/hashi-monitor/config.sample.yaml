# Sample configuration for hashi-monitor

# Liveness delay bounds (seconds)
e1_e2_delay_secs: 300   # E1 (Hashi approval) -> E2 (Guardian signing)
e2_e3_delay_secs: 300   # E2 (Guardian signing) -> E3 (BTC confirmed)

# Clock skew tolerance: E_{i+1} can occur up to clock_skew seconds before E_i (default: 60s)
# clock_skew: 60

# Poll interval for continuous mode (default: 10s)
# poll_interval_secs: 10

guardian:
  s3_bucket: "hashi-guardian-logs"

sui:
  rpc_url: "https://fullnode.testnet.sui.io:443"

btc:
  rpc_url: "http://localhost:8332"
