syntax = "proto3";

package sui.hashi.v1alpha;

message Committee {
  optional uint64 epoch = 1;
  repeated CommitteeMember members = 2;
  optional uint64 total_weight = 3;
  // BCS-encoded VecMap<String, config_value::Value> pinned from the on-chain
  // committee. Carried verbatim so the committee's signed BCS bytes survive
  // this hop without reconstruction. Replaces the former flat mpc_* fields
  // (which dropped the nonce protocol and any future keys).
  optional bytes config = 7;
  reserved 4, 5, 6;
  reserved "mpc_threshold_in_basis_points";
  reserved "mpc_weight_reduction_allowed_delta";
  reserved "mpc_max_faulty_in_basis_points";
}

message CommitteeMember {
  optional string address = 1;
  optional bytes public_key = 2;
  optional bytes encryption_public_key = 3;
  optional uint64 weight = 4;
}

message MemberSignature {
  optional uint64 epoch = 1;
  optional string address = 2;
  optional bytes public_key = 3;
  optional bytes signature = 4;
}

message CommitteeSignature {
  optional uint64 epoch = 1;
  optional bytes signature = 2;
  optional bytes bitmap = 3;
}
