syntax = "proto3";

package sui.hashi.v1alpha;

import "sui/hashi/v1alpha/signature.proto";
import "sui/hashi/v1alpha/utxo.proto";

service GuardianService {
  // Query the service for general information about its current state.
  rpc GetGuardianInfo(GetGuardianInfoRequest) returns (GetGuardianInfoResponse);

  // Ceremony mode only: generate a new BTC key and distribute encrypted shares.
  rpc SetupNewKey(SetupNewKeyRequest) returns (SignedSetupNewKeyResponse);

  // Ceremony mode only: rotate the KP set holding the existing BTC key. The
  // operator submits the current KPs' encrypted old shares in one request; once
  // threshold-many verify, the enclave reconstructs the BTC key, re-splits it
  // for the new KP set, writes the new share state (hashes) to ceremony/, and
  // returns the new encrypted shares.
  rpc RotateKps(RotateKpsRequest) returns (SignedRotateKpsResponse);

  // Operator initialization: provide stable config before provisioning.
  rpc OperatorInit(OperatorInitRequest) returns (OperatorInitResponse);

  // Bootstrap genesis committee: operator-trusted, first deploy only.
  rpc OperatorWriteGenesis(OperatorWriteGenesisRequest) returns (OperatorWriteGenesisResponse);

  // Provisioner initialization: submit the current KPs' signed share contributions.
  rpc ProvisionerInit(ProvisionerInitRequest) returns (ProvisionerInitResponse);

  // KP-facing: replace one OpenPGP cert wrapping an already-committed share.
  rpc ProvisionerRotateCert(SignedProvisionerRotateCertRequest) returns (SignedProvisionerRotateCertResponse);

  // Operator activation: derive live serving state and make an armed standby active.
  rpc OperatorActivate(OperatorActivateRequest) returns (OperatorActivateResponse);

  // Standard withdrawal: request withdrawal signature.
  rpc StandardWithdrawal(SignedStandardWithdrawalRequest) returns (SignedStandardWithdrawalResponse);

  // Advance the guardian's committee one handoff (signed by the outgoing committee). Idempotent.
  rpc UpdateCommittee(SignedCommitteeTransition) returns (UpdateCommitteeResponse);

  // Advance the guardian by replaying a chain of stored committee handoffs.
  rpc UpdateCommitteeChain(UpdateCommitteeChainRequest) returns (UpdateCommitteeResponse);
}

message GetGuardianInfoRequest {}

message GetGuardianInfoResponse {
  reserved 4;
  reserved "encrypted_shares";

  // AWS Nitro attestation document.
  optional bytes attestation = 1;

  // Guardian signing public key (Ed25519, 32 bytes).
  optional bytes signing_pub_key = 2;

  // Signed guardian info (includes server version, encryption pubkey, and optional S3/bucket info).
  SignedGuardianInfo signed_info = 3;
}

// Guardian-signed wrapper around `GuardianInfoData`.
message SignedGuardianInfo {
  GuardianInfoData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Guardian signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

enum CeremonyStage {
  CEREMONY_STAGE_UNSPECIFIED = 0;
  CEREMONY_STAGE_UNINITIALIZED = 1;
  CEREMONY_STAGE_OPERATOR_INITIALIZED = 2;
  CEREMONY_STAGE_COMPLETED = 3;
}

enum WithdrawStage {
  WITHDRAW_STAGE_UNSPECIFIED = 0;
  WITHDRAW_STAGE_UNINITIALIZED = 1;
  WITHDRAW_STAGE_OPERATOR_INITIALIZED = 2;
  WITHDRAW_STAGE_PROVISIONER_INITIALIZED = 3;
  WITHDRAW_STAGE_ACTIVATED = 4;
}

// Information about the guardian enclave.
message GuardianInfoData {
  // Secret-sharing instance (if set).
  optional SecretSharingInstance secret_sharing_instance = 1;

  // S3 bucket info (if set). Used by key provisioners to check S3 bucket info.
  optional S3BucketInfo bucket_info = 2;

  // Guardian encryption public key (32 bytes).
  optional bytes encryption_pubkey = 3;

  // Git revision of the guardian build. Untrusted (enclave-self-reported);
  // KP tooling verifies by reproducibly building at this revision and matching
  // the resulting PCRs against the session's attestation PCRs.
  optional string untrusted_git_revision = 4;

  // X-only Bitcoin pubkey of the enclave's BTC signing key (32 bytes).
  // Absent before `provisioner_init` has set the keypair.
  optional bytes enclave_btc_pubkey = 5;

  // Digest of the operator-supplied InitConfig (32 bytes, if set).
  optional bytes config_hash = 6;

  // Current rate limiter state (if initialized).
  LimiterState limiter_state = 7;

  // Immutable limiter configuration (if initialized).
  LimiterConfig limiter_config = 8;

  // Current committee epoch (if initialized). Drives `UpdateCommittee` catch-up.
  optional uint64 current_committee_epoch = 9;

  // MPC committee verifying key `G` as `bcs(G)` (the derivation master, NOT the
  // guardian's own BTC key). Set after operator_init.
  optional bytes mpc_master_g = 10;

  // Signed enclave mode and its current lifecycle stage.
  oneof lifecycle {
    CeremonyStage ceremony = 11;
    WithdrawStage withdraw = 12;
  }
}

// Public description of the current BTC key's secret-sharing scheme.
// `commitments.len() == num_shares` and `2 <= threshold <= num_shares`.
// `sharing_seq` versions instances: 0 at setup, +1 per rotation.
message SecretSharingInstance {
  repeated GuardianShareCommitment commitments = 1;
  optional uint32 num_shares = 2;
  optional uint32 threshold = 3;
  optional uint64 sharing_seq = 4;
}

message S3BucketInfo {
  optional string bucket = 1;
  optional string region = 2;
}

// =======================
//      SetupNewKey
// =======================

// One KP's accepted OpenPGP certs. A KP can have multiple certs for the
// same secret-share id.
message KpPgpCertSet {
  // Armored OpenPGP certificates for one key provisioner.
  repeated string pgp_certs = 1;
}

// Untrusted wire DTO. Converted to a validated domain request in the server.
message SetupNewKeyRequest {
  // OpenPGP cert sets for key provisioners. Length must equal `num_shares`.
  repeated KpPgpCertSet key_provisioner_pgp_cert_sets = 1;

  // Total number of shares to split the new BTC key into. Must match the number
  // of KP cert sets, not the total number of certs.
  optional uint32 num_shares = 2;

  // Reconstruction threshold. Must satisfy `2 <= threshold <= num_shares`.
  optional uint32 threshold = 3;
}

// Ciphertext produced by HPKE encryption.
message HPKECiphertext {
  optional bytes encapsulated_key = 1;
  optional bytes aes_ciphertext = 2;
}

// ShareID (NonZeroU16 in Rust). Validate 1 <= id <= 65535 in conversion.
message GuardianShareID {
  optional uint32 id = 1;
}

// HPKE-encrypted secret share sent to the guardian.
message GuardianEncryptedShare {
  GuardianShareID id = 1;
  HPKECiphertext ciphertext = 2;
}

// All PGP-encrypted copies of one KP share.
message SingleKPEncryptedShares {
  GuardianShareID id = 1;
  // Recipient PGP fingerprint to armored ciphertext.
  map<string, string> ciphertexts = 2;
}

// Commitment to a secret share.
message GuardianShareCommitment {
  GuardianShareID id = 1;
  optional string digest_hex = 2;
}

// Unsigned response payload.
message SetupNewKeyResponseData {
  repeated SingleKPEncryptedShares encrypted_shares = 1;
  SecretSharingInstance secret_sharing_instance = 2;
  // x-only BTC master pubkey (32 bytes); lets the operator publish it on-chain pre-provision.
  bytes btc_master_pubkey = 3;
}

// Application-layer signed response.
message SignedSetupNewKeyResponse {
  SetupNewKeyResponseData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

// =======================
//      OperatorInit
// =======================

message OperatorInitRequest {
  // S3 access keys
  S3Config s3_config = 1;

  // Withdraw-mode stable init config (absent for a ceremony enclave). The enclave
  // exposes its digest via GuardianInfo; KPs bind it into signed PI submissions.
  InitConfig init_config = 4;
}

message OperatorInitResponse {}

message OperatorWriteGenesisRequest {
  Committee committee = 1;
}

message OperatorWriteGenesisResponse {}

message S3Config {
  optional string access_key = 1;
  optional string secret_key = 2;
  optional string bucket_name = 3;
  optional string region = 4;
  optional string session_token = 5;
}

enum Network {
  MAINNET = 0;
  TESTNET = 1;
  REGTEST = 2;
  SIGNET = 3;
}

// ==========================
//      ProvisionerInit
// ==========================

// One KP's signed contribution toward ProvisionerInit. The relay may pre-verify
// and buffer these submissions, but the enclave is the authoritative verifier.
message SignedSingleProvisionerInitRequest {
  // This KP's share, HPKE-encrypted to the enclave session key without config
  // AAD. The signature below binds the share to the expected config instead.
  GuardianEncryptedShare encrypted_share = 1;

  // The guardian session id the KP pinned before encrypting the share.
  string expected_session_id = 2;

  // Armored OpenPGP certificate of the submitting key provisioner.
  string signer_cert = 3;

  // Detached armored OpenPGP signature over the intent-tagged
  // SingleProvisionerInitRequest payload.
  string kp_signature = 4;

  // The operator-init config hash the KP independently recomputed and verified.
  optional bytes expected_config_hash = 5;
}

// Assembled from the current KPs' signed submissions by the relay once it has
// collected enough. The enclave re-verifies every submission before using any
// share.
message ProvisionerInitRequest {
  repeated SignedSingleProvisionerInitRequest submissions = 1;
}

message OperatorActivateRequest {
  // Digest of the ActivationState the operator expects the enclave to derive.
  optional bytes expected_state_hash = 1;
}

message OperatorActivateResponse {}

message BuildPcrs {
  optional string git_revision = 1;
  optional bytes pcr0 = 2;
}

message PcrAllowlist {
  BuildPcrs current_build = 1;
  repeated BuildPcrs prev_builds = 2;
}

message InitConfig {
  // Limiter configuration.
  LimiterConfig limiter_config = 1;

  // Compressed public key bytes (33 bytes).
  optional bytes hashi_btc_master_pubkey = 2;

  // Guardian build PCR pins used by operators/KPs for attestation checks.
  PcrAllowlist pcr_allowlist = 3;

  // BTC network.
  optional Network network = 4;
}

message LimiterState {
  // Available tokens in sats.
  optional uint64 num_tokens_available_sats = 1;

  // Last updated timestamp in unix seconds.
  optional uint64 last_updated_at_secs = 2;

  // Next expected withdrawal sequence number.
  optional uint64 next_seq = 3;
}

// Immutable limiter configuration.
message LimiterConfig {
  // Token refill rate in sats per second.
  optional uint64 refill_rate_sats_per_sec = 1;

  // Maximum bucket capacity in sats.
  optional uint64 max_bucket_capacity_sats = 2;
}

message ProvisionerInitResponse {}

// ==========================
//        ProvisionerRotateCert
// ==========================

// Replace one certificate in a KP roster entry. This does not change the BTC
// key, sharing instance, commitments, share ids, or threshold.
message SignedProvisionerRotateCertRequest {
  // Armored replacement cert.
  string new_kp_pgp_cert = 1;

  // The same plaintext share, HPKE-encrypted to the guardian.
  GuardianEncryptedShare encrypted_share = 2;

  // The guardian session id the KP pinned before encrypting the share.
  string expected_session_id = 3;

  // Armored authorizing KP cert and detached signature over the intent-tagged
  // ProvisionerRotateCertRequest payload.
  string signer_cert = 4;
  string kp_signature = 5;

  // Latest kp-shares cert_seq observed and authorized by the caller.
  optional uint64 expected_cert_seq = 6;

  // Fingerprint of the current cert to replace. The signing cert may be this
  // cert or another cert assigned to the same KP/share entry.
  string target_kp_pgp_fingerprint = 7;
}

message SignedProvisionerRotateCertResponse {
  // New cert_seq written under kp-shares/{sharing_seq}/.
  optional uint64 cert_seq = 1;

  // The changed KP entry after replacing one certificate ciphertext.
  SingleKPEncryptedShares encrypted_shares = 2;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 3;

  // Signature over (intent || data || timestamp).
  optional bytes signature = 4;
}

// ==========================
//        RotateKps
// ==========================

// Assembled by the operator from the current KPs' encrypted old shares plus the
// shared rotation target. Each old share binds the same state digest as HPKE
// AAD, so the enclave only decrypts submissions that agree on the target.
// Asymmetry between old and new (n, t) is allowed.
message RotateKpsRequest {
  repeated GuardianEncryptedShare encrypted_old_shares = 1;

  // OpenPGP cert sets for the new KP set. Length must equal new_num_shares.
  repeated KpPgpCertSet new_kp_pgp_cert_sets = 2;

  optional uint32 new_num_shares = 3;
  optional uint32 new_threshold = 4;

  // The current key's secret-sharing instance (old commitments + threshold) the
  // enclave verifies the submitted old shares against.
  SecretSharingInstance old_instance = 5;
}

// Unsigned response payload.
message RotateKpsResponseData {
  repeated SingleKPEncryptedShares encrypted_shares = 1;
}

// Application-layer signed response.
message SignedRotateKpsResponse {
  RotateKpsResponseData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

// ============================
//    StandardWithdrawal
// ============================

// Hashi-signed wrapper for the withdrawal request.
message SignedStandardWithdrawalRequest {
  StandardWithdrawalRequestData data = 1;

  // Committee signature over the request.
  CommitteeSignature committee_signature = 2;
}

// Withdrawal request payload.
message StandardWithdrawalRequestData {
  // 32-byte UID of the on-chain `WithdrawalTransaction` Sui object.
  optional bytes wid = 1;

  // Transaction UTXOs (inputs and outputs).
  TxUtxos utxos = 2;

  // Timestamp in unix seconds (signed by committee, used for rate limiting).
  optional uint64 timestamp_secs = 3;

  // Monotonic sequence number for ordering withdrawals.
  optional uint64 seq = 4;
}

// Guardian-signed response.
message SignedStandardWithdrawalResponse {
  StandardWithdrawalResponseData data = 1;

  // Milliseconds since Unix epoch.
  optional uint64 timestamp_ms = 2;

  // Guardian signature over (intent || data || timestamp).
  optional bytes signature = 3;
}

// Unsigned response payload.
message StandardWithdrawalResponseData {
  // Bitcoin signatures for each input (64 bytes each, Schnorr signatures).
  repeated bytes enclave_signatures = 1;
}

// ============================
//      UpdateCommittee
// ============================

// Handoff payload. Hashi committee epochs are sparse, so `new_committee.epoch`
// only needs to be greater than the guardian's current committee epoch.
message CommitteeTransition {
  Committee new_committee = 1;
}

message SignedCommitteeTransition {
  CommitteeTransition data = 1;

  // Outgoing committee's signature; `epoch` is `new_committee.epoch - 1`.
  CommitteeSignature committee_signature = 2;
}

message UpdateCommitteeChainRequest {
  repeated SignedCommitteeTransition transitions = 1;
}

message UpdateCommitteeResponse {
  // Guardian's committee epoch after the call (unchanged on no-op).
  optional uint64 current_committee_epoch = 1;
}
