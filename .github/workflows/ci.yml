name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule: [cron: "40 1 * * *"]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install Bitcoin Core
        env:
          # Fallback version if auto-detection fails
          FALLBACK_VERSION: "29.1"
        run: |
          # Get latest Bitcoin Core version from GitHub API
          echo "Detecting latest Bitcoin Core version..."
          BITCOIN_VERSION=$(curl -s https://api.github.com/repos/bitcoin/bitcoin/releases/latest | \
            sed -n 's/.*"tag_name": "v\([^"]*\)".*/\1/p' || echo "$FALLBACK_VERSION")
          
          # Validate version was detected
          if [ -z "$BITCOIN_VERSION" ]; then
            echo "Failed to detect version, using fallback: $FALLBACK_VERSION"
            BITCOIN_VERSION="$FALLBACK_VERSION"
          fi
          
          echo "Installing Bitcoin Core v${BITCOIN_VERSION}..."
          
          # Download Bitcoin Core
          wget https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_VERSION}/bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz || {
            echo "Download failed. The version ${BITCOIN_VERSION} might not be available on bitcoincore.org yet."
            echo "Falling back to version ${FALLBACK_VERSION}..."
            BITCOIN_VERSION="$FALLBACK_VERSION"
            wget https://bitcoincore.org/bin/bitcoin-core-${BITCOIN_VERSION}/bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz
          }
          
          echo "Extracting Bitcoin Core..."
          tar -xzf bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz
          
          # Move bitcoind to PATH
          echo "Installing Bitcoin Core binaries..."
          sudo mv bitcoin-${BITCOIN_VERSION}/bin/bitcoind /usr/local/bin/
          sudo mv bitcoin-${BITCOIN_VERSION}/bin/bitcoin-cli /usr/local/bin/
          
          # Cleanup
          rm -rf bitcoin-${BITCOIN_VERSION}-x86_64-linux-gnu.tar.gz bitcoin-${BITCOIN_VERSION}/
          
          # Verify installation
          echo "Verifying installation..."
          bitcoind --version

      - name: Install Sui Binary
        run: |
          # Get mainnet release versions
          echo "Detecting Sui mainnet versions..."
          MAINNET_VERSIONS=$(curl -s https://api.github.com/repos/MystenLabs/sui/releases | \
            jq -r '.[] | select(.tag_name | startswith("mainnet-")) | .tag_name' | \
            head -n 3)

          if [ -z "$MAINNET_VERSIONS" ]; then
            echo "Failed to detect mainnet versions, falling back to mainnet-v1.56.2"
            MAINNET_VERSIONS="mainnet-v1.56.2"
          fi

          # Try versions in order until one succeeds
          DOWNLOAD_SUCCESS=false
          for SUI_VERSION in $MAINNET_VERSIONS; do
            echo "Trying Sui binary ${SUI_VERSION}..."
            if wget -q https://github.com/MystenLabs/sui/releases/download/${SUI_VERSION}/sui-${SUI_VERSION}-ubuntu-x86_64.tgz; then
              echo "Successfully downloaded ${SUI_VERSION}"
              DOWNLOAD_SUCCESS=true
              break
            else
              echo "Failed to download ${SUI_VERSION}, trying next version..."
            fi
          done

          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "Failed to download any Sui version"
            exit 1
          fi

          echo "Extracting Sui binary..."
          tar -xzf sui-*.tgz ./sui

          # Move sui binary to PATH
          echo "Installing Sui binary..."
          sudo mv sui /usr/local/bin/

          # Cleanup
          rm -f sui-*.tgz

          # Verify installation
          echo "Verifying Sui installation..."
          sui --version

          # Export SUI_BINARY for tests
          echo "SUI_BINARY=/usr/local/bin/sui" >> $GITHUB_ENV

      - name: Run tests
        run: make test

      - run: make is-dirty

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      # Install buf
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1.24.0
        with:
          version: 1.47.2
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: rustfmt
        run: |
          cargo fmt -- --check
          buf format --diff --exit-code

      - name: clippy
        run: make clippy

      - run: make buf-lint
      - run: make proto

      - run: make is-dirty

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - name: rustdoc
        run: make doc

      - uses: taiki-e/install-action@mdbook
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook-mermaid
      - name: build mdbook
        run: cd design && mdbook build

      - run: make is-dirty
