name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule: [cron: "40 1 * * *"]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@cargo-nextest

      - name: Install Bitcoin Core
        run: |
          # Download Bitcoin Core v29.1.0
          wget -q https://bitcoincore.org/bin/bitcoin-core-29.1.0/bitcoin-29.1.0-x86_64-linux-gnu.tar.gz
          tar -xzf bitcoin-29.1.0-x86_64-linux-gnu.tar.gz
          # Move bitcoind to PATH
          sudo mv bitcoin-29.1.0/bin/bitcoind /usr/local/bin/
          sudo mv bitcoin-29.1.0/bin/bitcoin-cli /usr/local/bin/
          # Verify installation
          bitcoind --version

      - name: Run tests
        run: make test

      - run: make is-dirty

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      # Install buf
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1.24.0
        with:
          version: 1.47.2
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: rustfmt
        run: |
          cargo fmt -- --check
          buf format --diff --exit-code

      - name: clippy
        run: make clippy

      - run: make buf-lint
      - run: make proto

      - run: make is-dirty

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - name: rustdoc
        run: make doc

      - uses: taiki-e/install-action@mdbook
      - name: build mdbook
        run: cd design && mdbook build

      - run: make is-dirty
