name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule: [ cron: "40 1 * * *" ]

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - uses: taiki-e/install-action@cargo-nextest

      - name: Run tests
        run: make test
        env:
          CARGO_BUILD_JOBS: 4

      - run: make is-dirty

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      # Install buf
      - name: Install buf
        uses: bufbuild/buf-setup-action@v1.24.0
        with:
          version: 1.47.2
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: rustfmt
        run: |
          cargo fmt -- --check
          buf format --diff --exit-code

      - name: clippy
        run: make clippy
        env:
          CARGO_BUILD_JOBS: 4

      - run: make buf-lint
      - run: make proto

      - run: make is-dirty

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: rust version
        run: |
          rustc --version
          cargo --version

      - name: rustdoc
        run: make doc
        env:
          CARGO_BUILD_JOBS: 4

      - uses: taiki-e/install-action@mdbook
      - name: build mdbook
        run: cd design && mdbook build

      - run: make is-dirty
