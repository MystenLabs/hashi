name: Deterministic Docker Builds

on:
  pull_request:
  workflow_call:
    inputs:
      hashi_only:
        description: Only build and verify the hashi binary
        type: boolean
        required: false
        default: false
  workflow_dispatch:
  schedule: [cron: "20 3 * * *"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        image: ${{ fromJSON(inputs.hashi_only && '[{"name":"hashi","dir":"hashi"}]' || '[{"name":"hashi","dir":"hashi"},{"name":"hashi-screener","dir":"hashi-screener"},{"name":"hashi-guardian","dir":"hashi-guardian-k8s"}]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # pin@v7

      - name: Build ${{ matrix.image.name }} image
        env:
          GIT_REVISION: ${{ github.sha }}
          IMAGE_NAME: ${{ matrix.image.name }}
        run: bash docker/${{ matrix.image.dir }}/build.sh --no-cache

      - name: Compute sha256
        id: hash
        run: |
          BIN="out/${{ matrix.image.name }}"
          HASH=$(sha256sum "${BIN}" | awk '{print $1}')
          echo "sha256=${HASH}" >> "$GITHUB_OUTPUT"
          echo "${HASH}  ${{ matrix.image.name }}" > "out/${{ matrix.image.name }}.sha256"

      - name: Upload sha256
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # pin@v4
        with:
          name: ${{ matrix.image.name }}-${{ matrix.os }}-sha256
          if-no-files-found: error
          path: out/${{ matrix.image.name }}.sha256

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # pin@v4
        with:
          name: ${{ matrix.image.name }}-${{ matrix.os }}-binary
          if-no-files-found: error
          path: out/${{ matrix.image.name }}

  verify:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(inputs.hashi_only && '["hashi"]' || '["hashi","hashi-screener","hashi-guardian"]') }}
    steps:
      - name: Download ubuntu-latest hash
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # pin@v4
        with:
          name: ${{ matrix.image }}-ubuntu-latest-sha256
          path: hash-latest

      - name: Download ubuntu-22.04 hash
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # pin@v4
        with:
          name: ${{ matrix.image }}-ubuntu-22.04-sha256
          path: hash-22

      - name: Compare hashes
        id: compare
        run: |
          LATEST=$(awk '{print $1}' "hash-latest/${{ matrix.image }}.sha256")
          OLDER=$(awk '{print $1}' "hash-22/${{ matrix.image }}.sha256")
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "older=${OLDER}" >> "$GITHUB_OUTPUT"
          if [ "${LATEST}" = "${OLDER}" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write summary
        run: |
          {
            echo "## ${{ matrix.image }} reproducibility"
            echo ""
            echo "| Runner | SHA-256 |"
            echo "|--------|---------|"
            echo "| ubuntu-latest | \`${{ steps.compare.outputs.latest }}\` |"
            echo "| ubuntu-22.04  | \`${{ steps.compare.outputs.older }}\` |"
            echo ""
            echo "**Result**: ${{ steps.compare.outputs.match == 'true' && 'Reproducible' || 'MISMATCH' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if hashes differ
        if: steps.compare.outputs.match != 'true'
        run: |
          echo "${{ matrix.image }} binary hashes differ across runners!"
          exit 1
